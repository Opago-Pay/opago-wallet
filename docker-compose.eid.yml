version: '3.8'

services:
  # Dies ist ein Platzhalter für einen echten BSI-zertifizierten Open-Source eID-Server
  # (z.B. Open eCard Projekt oder eID-Server des BSI).
  # Für die Testumgebung wird dieser Container mit Test-Zertifikaten (Test-PKI) hochgefahren.
  eid-server:
    image: ghcr.io/open-ecard/eid-server:latest # Beispiel-Image
    container_name: opago-eid-server
    ports:
      - "8443:8443" # SAML / SOAP API
      - "24727:24727" # Optional für lokale AusweisApp Anbindung
    environment:
      - EID_ENVIRONMENT=TEST # Nutzt die Test-PKI (Testausweis)
      - EID_BERECHTIGUNGSZERTIFIKAT=/certs/berechtigungszertifikat_test.cvc
      - EID_PRIVATE_KEY=/certs/eid_server_key.pem
      - SP_SAML_ENTITY_ID=https://opago.pay/eid
    volumes:
      - ./eid-certs:/certs:ro
    restart: unless-stopped
